name: g1_dex3
# Selects G1Dex3Profile in end2end/robot_profiles.py (7 right-arm joints planned
# by cuRobo; 7 right Dex3 finger joints driven as the gripper; legs+waist+left
# arm locked at the AMO standing pose in the cuRobo config).
profile: g1_dex3

curobo:
  # Custom cuRobo config generated by end2end/build_g1_dex3.py. base_link=pelvis
  # (URDF root, so it matches the pipeline's full-URDF FK), ee=right_hand_palm_link,
  # active joints = the 7 right-arm joints, everything else locked. The loader
  # substitutes ABSOLUTE_PATH_PLACEHOLDER_* from urdf_path/asset_root_path below.
  robot_config: ../curobo_assets/g1_dex3.yml
  # cuRobo drives this frame to the grasp pose. It's a synthetic TCP frame
  # (defined as an extra_link in g1_dex3.yml) whose +Z is the Dex3 palm's real
  # approach/finger axis, so the pipeline's "approach along tool +Z" assumption
  # holds. (profile.tool_frame stays right_hand_palm_link for the wrist cam.)
  tool_frame: right_dex3_tcp
  # Plan start seed = RIGHT_ARM_READY: right palm hovering over the object,
  # pointing down (FK-found). Starting here lets cuRobo's trajopt converge on the
  # full approach→grasp→lift. Must match cspace.default_joint_position in
  # curobo_assets/g1_dex3.yml. See build_g1_dex3.py and docs §9.8.
  default_joint_position: [0.5, 0.0, -0.2, 1.5708, 0.0, 0.0, 0.0]

graspgen:
  # Dex3 hand is the GraspGenX `unitree_g1` gripper (revolute_3f, 7 joints,
  # grasp frame at the palm with approach along +Z). checkpoints_dir omitted:
  # GraspGenX resolves it via $GRASPGENX_CHECKPOINT_DIR / the managed root.
  gripper_name: unitree_g1

grasp_to_tool_transform:
  # GraspGenX's unitree_g1 grasp frame is defined at the palm (right_palm_link)
  # with the same axis convention as tool_frame=right_hand_palm_link, so this
  # starts at identity. If the closed fingers visibly miss the object, calibrate
  # this the way franka_panda.yaml documents its +90° Z fix.
  translation: [0.0, 0.0, 0.0]
  quaternion_xyzw: [0.0, 0.0, 0.0, 1.0]

robot_base_pose:
  # World pose of the URDF root (pelvis). z places the (q=0 render) soles on the
  # floor; torso_link then sits at ~0.83 m (waist=0). The G1 stands facing +x
  # with the table in front; see envs/g1_tabletop_demo.yaml.
  translation: [0.0, 0.0, 0.787]
  quaternion_xyzw: [0.0, 0.0, 0.0, 1.0]

# G1 + Dex3 URDF, vendored into the repo under end2end/robots/g1/ (${E2E}
# resolves via end2end/paths.py). The Dex3 hands are already baked into this
# URDF (…_hand14); meshes live in the sibling meshes/ dir.
urdf_path: ${E2E}/robots/g1/g1_body29_hand14.urdf
asset_root_path: ${E2E}/robots/g1

# PD / sim overrides for dynamic_playback (Stage B). Arm gains mirror the Franka
# (stiff tracking of the cuRobo path); finger gains are gentle position control
# for the revolute Dex3 fingers. Lower-body gains live with the AMO controller,
# not here.
dynamic:
  arm_kp: 2000.0
  arm_kd: 100.0
  finger_kp: 200.0
  finger_kd: 20.0
  finger_effort_limit: 100.0
