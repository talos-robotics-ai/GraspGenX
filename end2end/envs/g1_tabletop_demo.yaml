name: g1_tabletop_demo

# Single HOPE object standing upright on a bare tabletop (no bin), sized and
# placed for the Unitree G1 + Dex3 right-arm pick_and_lift demo. Mirrors
# tabletop_single_nobin.yaml but shifts the table toward the robot's right arm
# (−y) and a touch closer, so the standing G1 (pelvis at z≈0.787, right shoulder
# near y≈−0.1) can reach the object without overextending. The object mesh is
# passed on the CLI via --mesh_file (HOPE units = mm → mesh_scale 0.001); this
# env only fixes its placement.
assets:
  - id: table
    # Counter-height table placed at a realistic standing distance. The G1's
    # right shoulder is at world ≈ (0, −0.10, 1.08) and a DLS-IK reach sweep of
    # the fixed-base standing pose shows the right palm reaches top-down grasps
    # out to x≈0.28. height=0.74 + pose z=0.37 → top at 0.74 m; table center at
    # x=0.53 so its front edge (x≈0.13) clears the robot body (front at x≈0.08),
    # while the object sits under the right arm (offset −0.25) at x≈0.28. The
    # table is centred on y=−0.15 so the object (no y-offset) lands under the
    # right shoulder.
    type: procedural_table
    params: {width: 0.8, depth: 0.7, height: 0.74, thickness: 0.04, leg_thickness: 0.05}
    pose: {translation: [0.53, -0.15, 0.37], quaternion_xyzw: [0.0, 0.0, 0.0, 1.0]}
    support_label: table_top
    collision: cuboid_from_extents

object_slot:
  parent: table
  surface: table_top
  # Placed directly under the right arm's natural reach point. A DLS-IK sweep of
  # the fixed-base standing G1 shows the right palm reaches top-down grasps out to
  # x≈0.28 across the whole y-range, and the RIGHT_ARM_READY seed puts the palm at
  # world ≈ [0.273, −0.158, 0.902] — hovering right above THIS spot. Placing the
  # object here (vs the old cramped x≈0.20, which sat 8 cm inboard of the seed and
  # only 4 cm off the torso front) makes the grasp happen in free space: the box
  # front face at x≈0.20 clears the torso (front at x≈0.08) by ~12 cm, so hand and
  # box no longer visually overlap the body. table center x=0.53 + offset −0.25 →
  # object x≈0.28; y=−0.15 puts it under the right shoulder. See docs §9.10.
  translation_offset: [-0.25, 0.0, 0.0]
  upright: true
  mesh_scale: 0.001
  pre_rotation: [1.0, 0.0, 0.0, 90.0]

extra_collision: []

visual:
  show_ground_grid: true
  background_color: [0.95, 0.95, 0.95]
  # Front-right view so the right-arm grasp is clearly visible.
  camera: {eye: [1.20, -0.70, 1.35], target: [0.28, -0.15, 0.85]}
