name: g1_tabletop_demo

# Single HOPE object standing upright on a bare tabletop (no bin), sized and
# placed for the Unitree G1 + Dex3 right-arm pick_and_lift demo. Mirrors
# tabletop_single_nobin.yaml but shifts the table toward the robot's right arm
# (−y) and a touch closer, so the standing G1 (pelvis at z≈0.787, right shoulder
# near y≈−0.1) can reach the object without overextending. The object mesh is
# passed on the CLI via --mesh_file (HOPE units = mm → mesh_scale 0.001); this
# env only fixes its placement.
assets:
  - id: table
    # Counter-height table placed at a realistic standing distance. The G1's
    # right shoulder is at world ≈ (0, −0.10, 1.08) and the right arm reaches
    # ~0.45 m; an FK sweep shows the object is comfortably reachable at world
    # ≈ [0.28, −0.10, 0.83] (33/15000 sampled configs within 6 cm). height=0.75
    # + pose z=0.375 → top at 0.75 m; the table center sits at x=0.52 so its
    # front edge (x≈0.12) clears the robot's body, while the object sits near
    # the front edge (offset −0.24) at x≈0.28.
    type: procedural_table
    params: {width: 0.8, depth: 0.8, height: 0.82, thickness: 0.04, leg_thickness: 0.05}
    pose: {translation: [0.50, -0.10, 0.41], quaternion_xyzw: [0.0, 0.0, 0.0, 1.0]}
    support_label: table_top
    collision: cuboid_from_extents

object_slot:
  parent: table
  surface: table_top
  # Close to the shoulder (~0.30 m) so grasp *orientations* are reachable, not
  # just the position: table center x=0.50 + offset −0.26 → object x≈0.24, and
  # the tall table puts it near shoulder height (~0.90 m) so the arm stays clear
  # above the table top (0.82 m).
  translation_offset: [-0.26, 0.0, 0.0]
  upright: true
  mesh_scale: 0.001
  pre_rotation: [1.0, 0.0, 0.0, 90.0]

extra_collision: []

visual:
  show_ground_grid: true
  background_color: [0.95, 0.95, 0.95]
  # Front-right view so the right-arm grasp is clearly visible.
  camera: {eye: [1.15, -0.60, 1.35], target: [0.30, -0.10, 0.83]}
